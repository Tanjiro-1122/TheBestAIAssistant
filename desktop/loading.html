<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Starting SuperAgent...</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", Arial, sans-serif;
      }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        background: #0f172a;
        color: #e2e8f0;
      }
      .wrapper {
        text-align: center;
      }
      .spinner {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 4px solid #334155;
        border-top-color: #38bdf8;
        margin: 0 auto 14px;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="spinner" aria-hidden="true"></div>
      <p>Starting SuperAgent...</p>
    </div>
  </body>
</html>
